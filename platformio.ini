; FreezerSpinventory — ELECROW CrowPanel 2.1" ESP32-S3 Rotary Display (480x480 round)
;
; Build/upload firmware:   pio run -e crowpanel -t upload
; Run unit tests on host:  pio test -e native

[platformio]
default_envs = crowpanel

[env:crowpanel]
; espressif32 6.5.0 ships arduino-esp32 2.0.14, the core version Elecrow's
; ST7701/RGB-panel examples are built against (3.x breaks the RGB driver API).
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = arduino
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = huge_app.csv
board_build.arduino.memory_type = qio_opi
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DLV_CONF_PATH=${platformio.include_dir}/lv_conf.h
monitor_speed = 115200
lib_deps =
    ; 1.3.1 is the last release with the Arduino_ST7701_RGBPanel API used by
    ; Elecrow's demo code for this exact panel (not on the PIO registry, so
    ; pinned to the v1.3.1 commit).
    GFX Library for Arduino=https://github.com/moononournation/Arduino_GFX.git#3e4f9a0389d0c634cba798ef464f021ab5659b19
    lvgl/lvgl@8.4.0

[env:native]
platform = native
test_framework = unity
build_flags = -std=c++17
